  <!-- Button grid 3×3 -->
  <rect x="10" y="15" width="3" height="2.5" rx="0.6" fill="#6a1b9a" opacity="0.7"/>
  <rect x="14.5" y="15" width="3" height="2.5" rx="0.6" fill="#6a1b9a" opacity="0.7"/>
  <rect x="19" y="15" width="3" height="2.5" rx="0.6" fill="#1565c0" opacity="0.9"/>
  <rect x="10" y="19" width="3" height="2.5" rx="0.6" fill="#6a1b9a" opacity="0.7"/>
  <rect x="14.5" y="19" width="3" height="2.5" rx="0.6" fill="#6a1b9a" opacity="0.7"/>
  <rect x="19" y="19" width="3" height="2.5" rx="0.6" fill="#1565c0" opacity="0.9"/>
</svg>
